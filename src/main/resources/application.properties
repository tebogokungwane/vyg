spring.application.name=victory-youth-group

# Active profile (override with -Dspring.profiles.active=prod)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# JPA
spring.jpa.hibernate.ddl-auto=update

# Server - use PORT env var (required by Render), fallback to 2025 for local
server.port=${PORT:2025}

upload.dir=./uploads

# JWT
jwt.secret=${JWT_SECRET:VYG_SECRET_KEY_12345678901234567890_CHANGE_IN_PROD}

# Mail Configuration
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Debug CORS and Security
logging.level.com.vyg.config=DEBUG
logging.level.com.vyg.config.security=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web.cors=DEBUG
