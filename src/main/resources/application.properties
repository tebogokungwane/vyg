spring.application.name=victory-youth-group

# Default active profile if nothing is specified externally
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# JPA Default Behavior
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Server - Dynamic port mapping for local/cloud environments
server.port=${PORT:2025}

upload.dir=./uploads

# JWT Local Default (Fallback fallback)
jwt.secret=${JWT_SECRET:VYG_SECRET_KEY_12345678901234567890_CHANGE_IN_PROD}

# Mail Configuration Default
spring.mail.host=${MAIL_HOST:://gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Local Debug Framework Logs
://level.com.vyg.config=DEBUG
://level.com.vyg.config.security=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web.cors=DEBUG
